name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests — Domain
        run: >
          dotnet test tests/K1Idea.Domain.Tests
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/domain

      - name: Unit tests — Application
        run: >
          dotnet test tests/K1Idea.Application.Tests
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/application

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: ./coverage
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: k1idea_test
          POSTGRES_USER: k1idea
          POSTGRES_PASSWORD: k1idea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U k1idea"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Integration tests
        run: >
          dotnet test tests/K1Idea.API.IntegrationTests
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/integration
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=k1idea_test;Username=k1idea;Password=k1idea_test"
          JWT__Secret: "ci-secret-key-min-256-bits-long-enough-here-for-ci-only"
          JWT__Issuer: "k1idea-ci"
          JWT__Audience: "k1idea-client"
          ASPNETCORE_ENVIRONMENT: "Development"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: ./coverage/integration
          retention-days: 7
