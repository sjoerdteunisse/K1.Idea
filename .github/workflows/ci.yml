name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Domain tests
        run: >
          dotnet test tests/K1Idea.Domain.Tests
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Run Application tests
        run: >
          dotnet test tests/K1Idea.Application.Tests
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: ./coverage
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Integration tests
        run: >
          dotnet test tests/K1Idea.API.IntegrationTests
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
        env:
          JWT__Secret: "ci-secret-key-min-256-bits-long-enough-here-for-ci-only"
          JWT__Issuer: "k1idea-ci"
          JWT__Audience: "k1idea-client"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: ./coverage
          retention-days: 7
