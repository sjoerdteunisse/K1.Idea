services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: k1idea
      POSTGRES_USER: k1idea
      POSTGRES_PASSWORD: k1idea_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k1idea"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/K1Idea.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=k1idea;Username=k1idea;Password=k1idea_dev"
      JWT__Secret: "dev-secret-key-min-256-bits-long-enough-here-for-dev-only"
      JWT__Issuer: "k1idea-dev"
      JWT__Audience: "k1idea-client"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: